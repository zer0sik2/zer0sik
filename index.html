    <style>
      :root {
        --bg: #0f1115; --fg: #e5e7eb; --muted:#9ca3af; --accent:#60a5fa; --card:#141823;
      }
      * { box-sizing: border-box }
      html, body { height: 100% }
      body {
        margin: 0; font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, Apple Color Emoji, Segoe UI Emoji;

      }
      main {
        width: 100%; max-width: 720px; background: color-mix(in srgb, var(--card) 92%, transparent);
        border: 1px solid #1f2430; border-radius: 16px; padding: 28px 24px; box-shadow: 0 10px 30px rgba(0,0,0,.35);

      .sub { color: var(--muted); margin: 0 0 18px; font-size: 14px }
      .grid { display: grid; gap: 14px; margin-top: 18px }
      .card {
        border: 1px solid #232838; border-radius: 12px; padding: 14px 16px; background: #121725;
      }
      a { color: var(--accent); text-decoration: none }
      a:hover { text-decoration: underline }
      footer { margin-top: 20px; color: var(--muted); font-size: 12px }
      code { background: #0b0f1a; border: 1px solid #1f2430; padding: 2px 6px; border-radius: 6px }
