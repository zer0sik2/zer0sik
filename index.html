<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>zero0sik | Portfolio</title>
    <meta name="description" content="백엔드 개발자 윤영식(Zero0Sik) 포트폴리오" />
    <link rel="icon" href="data:;base64,iVBORw0KGgo=" />
    <style>
      /* === THEME (from attached palette) ===
         - Ink/Navy: #07111F (bg)
         - Paper:     #F3F3F4 (light fg)
         - Peach:     #EBBC95 (soft accent)
         - Orange:    #FC4E00 (primary accent)
      */
      :root {
        --bg: #07111F;          /* page background */
        --fg: #F3F3F4;          /* base text */
        --muted:#B7BCC3;        /* secondary text (derived from #F3F3F4) */
        --accent:#FC4E00;       /* links, primary accent */
        --accent-soft:#EBBC95;  /* chips, subtle accents */
        --card:#0B1626;         /* card bg slightly above page */
        --line:#152033;         /* borders */
      }

      * { box-sizing: border-box }
      html, body { height: 100% }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, Apple Color Emoji, Segoe UI Emoji;
        background:
          radial-gradient(1100px 700px at 75% -10%, color-mix(in srgb, var(--accent-soft) 16%, transparent) 0%, transparent 60%),
          radial-gradient(900px 600px at 10% -20%, color-mix(in srgb, var(--accent) 10%, transparent) 0%, transparent 70%),
          var(--bg);
        color: var(--fg);
        line-height: 1.6;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: 100%;
        max-width: 720px;
        background: color-mix(in srgb, var(--card) 92%, transparent);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 28px 24px;
        box-shadow: 0 10px 30px rgba(0,0,0,.35);
      }

      h1 { margin: 0 0 8px; font-size: clamp(28px, 4vw, 36px); letter-spacing: .3px }
      .sub { color: var(--muted); margin: 0 0 18px; font-size: 14px }

      .grid { display: grid; gap: 14px; margin-top: 18px }

      .card {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 14px 16px;
        background: var(--card);
      }

      a { color: var(--accent); text-decoration: none }
      a:hover { text-decoration: underline }

      footer { margin-top: 20px; color: var(--muted); font-size: 12px }

      code {
        background: #0b0f1a;
        border: 1px solid var(--line);
        padding: 2px 6px;
        border-radius: 6px
      }

      /* Accent chips / badges */
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 10px;
        border-radius: 999px;
        border: 1px solid color-mix(in srgb, var(--accent-soft) 35%, var(--line));
        background: color-mix(in srgb, var(--accent-soft) 18%, var(--card));
        color: var(--fg);
        font-size: 12px;
      }

      /* Button (for future use) */
      .btn {
        display: inline-block;
        padding: 10px 14px;
        border-radius: 10px;
        border: 1px solid color-mix(in srgb, var(--accent) 55%, var(--line));
        background: linear-gradient(180deg,
                    color-mix(in srgb, var(--accent) 24%, #1a1f2c) 0%,
                    color-mix(in srgb, var(--accent) 12%, #0f1422) 100%);
        color: var(--fg);
        text-decoration: none;
        font-weight: 600;
        transition: transform .04s ease;
      }
      .btn:active { transform: translateY(1px) }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Zero0Sik <span class="chip">Java · Spring Boot · SQL</span></h1>
        <p class="sub">윤영식 | Backend Developer — 트랜잭션 안정성과 운영 효율 중심</p>
      </header>

      <section class="grid">
        <div class="card">
          <strong>소개</strong>
          <p>트랜잭션 안정성과 운영 효율을 중시하는 백엔드 개발자입니다. Spring Boot, Batch, JPA/QueryDSL, RDBMS에 강점이 있습니다.</p>
        </div>

        <div class="card">
          <strong>프로젝트</strong>
          <ul>
            <li><a href="#" title="프로젝트 링크">프로젝트 A</a> — 간단 설명 한 줄</li>
            <li><a href="#" title="프로젝트 링크">프로젝트 B</a> — 간단 설명 한 줄</li>
          </ul>
        </div>

        <div class="card">
          <strong>링크</strong>
          <p>
            <a href="https://github.com/zero0sik" target="_blank" rel="noreferrer">GitHub</a> ·
            <a href="mailto:yoon0sik2@gmail.com">Email</a> ·
            <a href="#" target="_blank" rel="noreferrer">Resume</a>
          </p>
        </div>
      </section>

      <footer>
        <span>© <span id="y"></span> zero0sik. Built on GitHub Pages.</span>
      </footer>
    </main>

    <script>
      // 연도 자동 갱신
      document.getElementById('y').textContent = new Date().getFullYear();
    </script>
  </body>
</html>
