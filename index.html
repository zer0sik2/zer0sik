<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>zero0sik | Portfolio</title>
  <meta name="description" content="백엔드 개발자 윤영식(Zero0Sik) 포트폴리오" />
  <style>
    /* Hanwha Eagles 로고 기준 (화이트 베이스 + 오렌지/베이지 포인트)
       Orange : #f15a22
       Beige  : #d8b894
       Ink(문자색) : #121417   ← 네이비 아님(거의 블랙)
       Paper(배경) : #fff
    */
    :root{
      --paper:#ffffff;
      --ink:#121417;
      --muted:#6b7280;
      --orange:#f15a22;
      --beige:#d8b894;

      --card:#fafafa;
      --line:#eceff2;
      --radius:16px;
      --shadow: 0 10px 30px rgba(17, 24, 39, .08);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", "Malgun Gothic", sans-serif;
      background:
        radial-gradient(1200px 800px at 60% -10%, rgba(241,90,34,.12) 0%, transparent 55%),
        var(--paper);
      color:var(--ink);
      line-height:1.7;
      display:grid;
      place-items:center;
      padding:28px;
    }

    main{
      width:100%;
      max-width:820px;
      background: linear-gradient(180deg,#ffffff 0%,#fefefe 100%);
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:28px 26px;
    }

    /* 헤더 */
    header{display:flex;flex-direction:column;gap:10px;margin-bottom:6px}
    h1{
      margin:0;
      font-size:clamp(32px,4.8vw,44px);
      font-weight:900;
      letter-spacing:.2px;
      color:var(--ink);
      display:flex;align-items:center;gap:12px;
    }

    /* 오렌지 링 느낌의 얇은 바 */
    .ring{
      height:8px;border-radius:999px;margin:4px 0 2px;
      background:
        linear-gradient(90deg,transparent, var(--orange), transparent);
      opacity:.9;
    }

    .tag{
      display:inline-block;
      padding:6px 12px;
      font-size:13px;
      font-weight:700;
      color:#fff;
      background: var(--orange);
      border-radius:999px;
    }

    .sub{margin:0;color:var(--muted)}

    /* 콘텐츠 */
    .grid{display:grid;gap:16px;margin-top:18px}
    .card{
      background: var(--card);
      border:1px solid var(--line);
      border-radius: 14px;
      padding:16px 18px;
    }
    .card > strong{
      display:block;
      color:var(--orange);
      font-weight:800;
      margin-bottom:8px;
      letter-spacing:.2px;
    }

    /* 링크: 오렌지 기본, 호버 베이지 */
    a{
      color:var(--orange);
      text-underline-offset: 3px;
      text-decoration-color: color-mix(in srgb, var(--orange) 40%, transparent);
      font-weight:700;
      text-decoration:none;
    }
    a:hover{
      color:var(--beige);
      text-decoration:underline;
    }

    /* 리스트 점을 베이지 스티치 색으로 */
    ul{margin:0;padding-left:20px}
    li{margin:6px 0}
    li::marker{color:var(--beige)}

    /* 푸터 */
    footer{margin-top:22px;color:var(--muted);font-size:12px;text-align:center}

    /* 야구공 스티치 디바이더 (선택) */
    .stitches{
      --size:18px;
      position:relative;
      height:14px;
      margin:14px 0 0;
      background:
        repeating-linear-gradient(90deg,
          transparent 0 calc(var(--size) - 10px),
          color-mix(in srgb, var(--beige) 80%, #fff) calc(var(--size) - 10px) var(--size));
      -webkit-mask:
        radial-gradient(6px 6px at 5px 50%, #000 98%, transparent 101%) left/18px 100% repeat-x;
              mask:
        radial-gradient(6px 6px at 5px 50%, #000 98%, transparent 101%) left/18px 100% repeat-x;
      opacity:.9;
    }
  </style>
</head>
<body>
<main id="app"
  style="
    /* 페이지 중앙 정렬 + 모바일 세로 스냅 */
    width:100%;
    max-width:820px;
    margin-inline:auto;
    border:1px solid var(--line);
    border-radius:16px;
    box-shadow:0 10px 30px rgba(17,24,39,.08);
    background:linear-gradient(180deg,#fff 0%,#fefefe 100%);
    /* 카드/섹션 단위 스냅 스크롤 */
    height:100svh;
    overflow-y:auto;
    scroll-snap-type:y mandatory;
    -webkit-overflow-scrolling:touch;
  "
  itemscope itemtype="https://schema.org/Person"
  aria-label="기본정보 섹션"
>
  <!-- Pane 1 : 기본정보 (화면 하나를 채우는 카드) -->
  <section
    style="
      scroll-snap-align:start;
      min-height:100svh;
      display:flex;
      align-items:center;
      padding:24px 20px;
    "
  >
    <div
      class="card"
      style="
        width:100%;
        background:#fafafa;
        border:1px solid var(--line);
        border-radius:14px;
        padding:18px 18px 16px;
      "
    >
      <strong style="display:block;color:var(--orange);font-weight:800;margin-bottom:10px;letter-spacing:.2px">기본정보</strong>
      <dl style="display:grid;grid-template-columns:minmax(96px,140px) 1fr;gap:10px 14px;margin:0">
        <dt>이름</dt>
        <dd itemprop="name">윤영식</dd>

        <dt>한문</dt>
        <dd>尹泳植</dd>

        <dt>영문</dt>
        <dd itemprop="alternateName">YOON YOUNG SIK</dd>

        <dt>생년월일</dt>
        <dd itemprop="birthDate" content="1989-05-15">1989-05-15</dd>

        <dt>주소</dt>
        <dd itemprop="addressLocality">서울특별시 강서구</dd>

        <dt>연락</dt>
        <dd>
          <a href="mailto:yoon0sik2@gmail.com" itemprop="email" style="color:var(--orange);font-weight:700;text-decoration:none">yoon0sik2@gmail.com</a>
          <span style="color:var(--muted)"> · </span>
          <a href="tel:+821030064434" itemprop="telephone" style="color:var(--orange);font-weight:700;text-decoration:none">010-3006-4434</a>
        </dd>
      </dl>
    </div>
  </section>

  <!-- Pane 2 : 다음 파트(빈 프레임) — 스냅 확인용, 이후 다른 섹션으로 대체 -->
  <section
    style="
      scroll-snap-align:start;
      min-height:100svh;
      display:flex;
      align-items:center;
      padding:24px 20px;
    "
    aria-hidden="true"
  >
    <div
      class="card"
      style="
        width:100%;
        background:#fafafa;
        border:1px solid var(--line);
        border-radius:14px;
        padding:28px 18px;
        text-align:center;
        color:var(--muted);
        font-size:14px;
      "
    >
      다음 카드 섹션 자리 (프로젝트/스킬 등) — 모바일에서 스와이프/스크롤로 딱 맞게 넘어가요.
    </div>
  </section>
</main>
  <script>
    document.getElementById('y').textContent = new Date().getFullYear();
  </script>
</body>
</html>
