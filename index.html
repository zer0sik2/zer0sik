<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>zero0sik | Portfolio</title>
  <meta name="description" content="백엔드 개발자 윤영식(Zero0Sik) 포트폴리오" />
  <style>
    /* Hanwha Eagles 로고 기준 (화이트 베이스 + 오렌지/베이지 포인트)
       Orange : #f15a22
       Beige  : #d8b894
       Ink(문자색) : #121417   ← 네이비 아님(거의 블랙)
       Paper(배경) : #fff
    */
    :root{
      --paper:#ffffff;
      --ink:#121417;
      --muted:#6b7280;
      --orange:#f15a22;
      --beige:#d8b894;

      --card:#fafafa;
      --line:#eceff2;
      --radius:16px;
      --shadow: 0 10px 30px rgba(17, 24, 39, .08);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", "Malgun Gothic", sans-serif;
      background:
        radial-gradient(1200px 800px at 60% -10%, rgba(241,90,34,.12) 0%, transparent 55%),
        var(--paper);
      color:var(--ink);
      line-height:1.7;
      display:grid;
      place-items:center;
      padding:28px;
    }

    main{
      width:100%;
      max-width:820px;
      background: linear-gradient(180deg,#ffffff 0%,#fefefe 100%);
      border:1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding:28px 26px;
    }

    /* 헤더 */
    header{display:flex;flex-direction:column;gap:10px;margin-bottom:6px}
    h1{
      margin:0;
      font-size:clamp(32px,4.8vw,44px);
      font-weight:900;
      letter-spacing:.2px;
      color:var(--ink);
      display:flex;align-items:center;gap:12px;
    }

    /* 오렌지 링 느낌의 얇은 바 */
    .ring{
      height:8px;border-radius:999px;margin:4px 0 2px;
      background:
        linear-gradient(90deg,transparent, var(--orange), transparent);
      opacity:.9;
    }

    .tag{
      display:inline-block;
      padding:6px 12px;
      font-size:13px;
      font-weight:700;
      color:#fff;
      background: var(--orange);
      border-radius:999px;
    }

    .sub{margin:0;color:var(--muted)}

    /* 콘텐츠 */
    .grid{display:grid;gap:16px;margin-top:18px}
    .card{
      background: var(--card);
      border:1px solid var(--line);
      border-radius: 14px;
      padding:16px 18px;
    }
    .card > strong{
      display:block;
      color:var(--orange);
      font-weight:800;
      margin-bottom:8px;
      letter-spacing:.2px;
    }

    /* 링크: 오렌지 기본, 호버 베이지 */
    a{
      color:var(--orange);
      text-underline-offset: 3px;
      text-decoration-color: color-mix(in srgb, var(--orange) 40%, transparent);
      font-weight:700;
      text-decoration:none;
    }
    a:hover{
      color:var(--beige);
      text-decoration:underline;
    }

    /* 리스트 점을 베이지 스티치 색으로 */
    ul{margin:0;padding-left:20px}
    li{margin:6px 0}
    li::marker{color:var(--beige)}

    /* 푸터 */
    footer{margin-top:22px;color:var(--muted);font-size:12px;text-align:center}

    /* 야구공 스티치 디바이더 (선택) */
    .stitches{
      --size:18px;
      position:relative;
      height:14px;
      margin:14px 0 0;
      background:
        repeating-linear-gradient(90deg,
          transparent 0 calc(var(--size) - 10px),
          color-mix(in srgb, var(--beige) 80%, #fff) calc(var(--size) - 10px) var(--size));
      -webkit-mask:
        radial-gradient(6px 6px at 5px 50%, #000 98%, transparent 101%) left/18px 100% repeat-x;
              mask:
        radial-gradient(6px 6px at 5px 50%, #000 98%, transparent 101%) left/18px 100% repeat-x;
      opacity:.9;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Zero0Sik <span class="tag">Java · Spring Boot · SQL</span></h1>
      <div class="ring"></div>
      <p class="sub">윤영식 | Backend Developer — 트랜잭션 안정성과 운영 효율 중심</p>
    </header>

    <section class="grid">
      <div class="card">
        <strong>소개</strong>
        <p>트랜잭션 안정성과 운영 효율을 중시하는 백엔드 개발자입니다. Spring Boot, Batch, JPA/QueryDSL, RDBMS에 강점이 있습니다.</p>
        <div class="stitches" aria-hidden="true"></div>
      </div>

      <div class="card">
        <strong>프로젝트</strong>
        <ul>
          <li><a href="#">프로젝트 A</a> — 간단 설명 한 줄</li>
          <li><a href="#">프로젝트 B</a> — 간단 설명 한 줄</li>
        </ul>
      </div>

      <div class="card">
        <strong>링크</strong>
        <p>
          <a href="https://github.com/zero0sik" target="_blank" rel="noreferrer">GitHub</a> ·
          <a href="mailto:yoon0sik2@gmail.com">Email</a> ·
          <a href="#">Resume</a>
        </p>
      </div>
    </section>

    <footer>
      © <span id="y"></span> zero0sik. Built on GitHub Pages.
    </footer>
  </main>

  <script>
    document.getElementById('y').textContent = new Date().getFullYear();
  </script>
</body>
</html>
